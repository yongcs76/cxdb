name: Build CXDB for macOS

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-macos:
    name: Build CXDB Server (macOS Intel x86_64)
    runs-on: macos-12 # Request macOS 13 runner
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: System Info
        run: |
          echo "Runner: $(uname -a)"
          echo "RAM: $(sysctl hw.memsize | awk '{print $2/1024/1024/1024 " GB"}')"
          echo "CPU: $(sysctl -n machdep.cpu.brand_string)"
          echo "Arch: $(uname -m)"
      
      - name: Install Rust toolchain (x86_64)
        run: |
          # Install Rust for x86_64 explicitly
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          source "$HOME/.cargo/env"
          rustup target add x86_64-apple-darwin
          rustc --version
          cargo --version
      
      - name: Build CXDB Server (Release, x86_64)
        run: |
          source "$HOME/.cargo/env"
          echo "Building CXDB server for macOS x86_64..."
          cd server
          cargo build --release --target x86_64-apple-darwin --verbose
          cd ..
          ls -lh target/x86_64-apple-darwin/release/
          file target/x86_64-apple-darwin/release/cxdb-server
      
      - name: Verify Intel architecture
        run: |
          file target/x86_64-apple-darwin/release/cxdb-server | grep "x86_64"
          if [ $? -ne 0 ]; then
            echo "ERROR: Binary is not x86_64!"
            exit 1
          fi
          echo "✅ Verified: Binary is x86_64"
      
      - name: Package binary
        run: |
          mkdir -p artifacts
          cp target/x86_64-apple-darwin/release/cxdb-server artifacts/ai-cxdb-store
          cd artifacts
          tar -czf cxdb-macos-x86_64.tar.gz ai-cxdb-store
          shasum -a 256 cxdb-macos-x86_64.tar.gz > cxdb-macos-x86_64.tar.gz.sha256
          ls -lh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cxdb-macos-x86_64
          path: artifacts/cxdb-macos-x86_64.tar.gz
          retention-days: 30
      
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: cxdb-macos-x86_64-checksum
          path: artifacts/cxdb-macos-x86_64.tar.gz.sha256
          retention-days: 30
      
      - name: Build summary
        run: |
          echo "✅ CXDB server built successfully for macOS x86_64"
          echo "Binary size: $(ls -lh artifacts/cxdb-macos-x86_64.tar.gz | awk '{print $5}')"
          echo "SHA256: $(cat artifacts/cxdb-macos-x86_64.tar.gz.sha256)"
          echo "Architecture: $(file artifacts/ai-cxdb-store)"
